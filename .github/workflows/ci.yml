name: CI
on: [push]
jobs:
  build:
    runs- on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version:  '16'
      - run: npm install
      - name: Check Node version
        run: |
          echo "Current Node version: $(node --version)"
          echo "Required Node version: >=18"
          node -e "
          const v = parseInt(process.versions.node.split('.')[0]);
          console.log('npm warn EBADENGINE unsupported engine');
          console.log('npm warn EBADENGINE   package: my-app@1.0.0');
          console.log('npm warn EBADENGINE   required: { node: >=18 }');
          console.log('npm warn EBADENGINE   current: { node: v' + process.versions.node + ' }');
          if(v < 18) { 
            console.error('npm error code EBADENGINE');
            console.error('npm error engine Unsupported engine');
            console.error('npm error Required: {node: >=18}');
            console.error('npm error Actual: {node: v' + process.versions.node + ', npm: 8.0.0}');
            process.exit(1); 
          }
          "
